<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🔥 Grelhadores</title>
<style>
  :root{--bg:#f6f4ef;--card:#fff;--ink:#1f2421;--mut:#7a8078;--line:#e7e3da;--ok:#2e7d4f;--acc:#c84b31;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);padding:16px;max-width:560px;margin:0 auto}
  h1{font-size:1.35rem;margin:8px 0 14px}
  h2{font-size:1rem;margin:22px 0 8px;color:var(--mut)}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 6px;text-align:center}
  .stat b{display:block;font-size:1.25rem}
  .stat span{font-size:.7rem;color:var(--mut)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
  .top{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .nome{font-weight:700}
  .chip{font-size:.7rem;padding:3px 9px;border-radius:99px;white-space:nowrap}
  .c-enc{background:#fdf3d7;color:#8a6207}
  .c-env{background:#e3edf9;color:#23538c}
  .c-done{background:#e3f3e9;color:#22663f}
  .meta{font-size:.8rem;color:var(--mut);margin-top:6px;line-height:1.5}
  .meta a{color:#23538c;text-decoration:none;font-weight:600}
  .notas{font-size:.78rem;color:var(--mut);margin-top:4px;font-style:italic}
  .toggles{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
  button.t{border:1.5px solid var(--line);background:#fafaf7;border-radius:10px;padding:10px 4px;font-size:.82rem;font-weight:600;color:var(--mut);cursor:pointer;transition:.15s}
  button.t.on{border-color:var(--ok);background:#e3f3e9;color:var(--ok)}
  button.t.alerta{border-color:var(--acc);background:#fdecea;color:var(--acc);animation:pisca 1s infinite}
  @keyframes pisca{50%{opacity:.35}}
  .notawrap{display:flex;gap:6px;margin-top:10px}
  .ninput{flex:1;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:.82rem;background:#fafaf7;color:var(--ink)}
  .ninput:focus{outline:none;border-color:#23538c}
  .nsave{border:1px solid var(--line);background:#fafaf7;border-radius:8px;padding:0 12px;cursor:pointer;font-size:.9rem}
  .logs{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:6px 14px}
  .log{font-size:.78rem;padding:8px 0;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:10px}
  .log:last-child{border-bottom:none}
  .log .q{color:var(--mut);white-space:nowrap}
  .vazio,.erro{text-align:center;color:var(--mut);padding:40px 0}
  .erro{color:var(--acc)}
  .reload{display:block;margin:18px auto;background:none;border:1px solid var(--line);border-radius:99px;padding:8px 22px;color:var(--mut);cursor:pointer;font-size:.85rem}
</style>
</head>
<body>
<h1>🔥 Grelhadores</h1>
<div class="stats" id="stats"></div>
<div id="lista"><div class="vazio">A carregar…</div></div>
<h2>📜 Histórico</h2>
<div class="logs" id="logs"><div class="vazio">A carregar…</div></div>
<button class="reload" onclick="loadAll()">↻ Atualizar</button>
<script>
const BASE='https://zucoohmjcabdtvjvbmdn.supabase.co/rest/v1';
const KEY='sb_publishable_2g8Pkk9Ieb1Z261wnm1K3g_zKV32Zr0';
const H={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json'};
let dados=[];
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
async function load(){
  try{
    const r=await fetch(BASE+'/grelhadores?select=*&order=data_encomenda.asc,id.asc',{headers:H});
    if(!r.ok) throw new Error(r.status);
    dados=await r.json();
    render();
  }catch(e){document.getElementById('lista').innerHTML='<div class="erro">Erro a carregar. Tenta novamente.</div>';}
}
async function loadLogs(){
  try{
    const r=await fetch(BASE+'/logs?select=*&order=criado_em.desc&limit=30',{headers:H});
    if(!r.ok) throw new Error(r.status);
    const ls=await r.json();
    document.getElementById('logs').innerHTML=ls.length?ls.map(l=>
      '<div class="log"><span>'+esc(l.evento)+'</span><span class="q">'+fmtHora(l.criado_em)+'</span></div>'
    ).join(''):'<div class="vazio">Sem atividade ainda.</div>';
  }catch(e){document.getElementById('logs').innerHTML='<div class="erro">Erro a carregar o histórico.</div>';}
}
function loadAll(){load();loadLogs();}
function fmtData(d){if(!d)return'';const p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function fmtHora(ts){return new Date(ts).toLocaleString('pt-PT',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit',timeZone:'Europe/Lisbon'});}
function render(){
  const s={casa:0,vend:0,divida:0};
  dados.forEach(g=>{if(g.recebido)s.casa++;if(g.vendido)s.vend++;if(g.vendido&&!g.pago)s.divida++;});
  document.getElementById('stats').innerHTML=
    '<div class="stat"><b>'+dados.length+'</b><span>Total</span></div>'+
    '<div class="stat"><b>'+s.casa+'</b><span>Recebidos</span></div>'+
    '<div class="stat"><b>'+s.vend+'</b><span>Vendidos</span></div>'+
    '<div class="stat"><b>'+s.divida+'</b><span>Por pagar</span></div>';
  if(!dados.length){document.getElementById('lista').innerHTML='<div class="vazio">Ainda sem grelhadores registados.</div>';return;}
  document.getElementById('lista').innerHTML=dados.map(g=>{
    let chip=g.pago?'<span class="chip c-done">✓ Concluído</span>':g.entregue?'<span class="chip c-done">📬 Entregue</span>':g.envio==='Enviado'?'<span class="chip c-env">🚚 Enviado</span>':'<span class="chip c-enc">🛒 Encomendado</span>';
    const trk=g.tracking?('Tracking: <a href="https://t.17track.net/pt#nums='+esc(g.tracking)+'" target="_blank">'+esc(g.tracking)+'</a>'):'Tracking: —';
    return '<div class="card">'+
      '<div class="top"><span class="nome">'+esc(g.nome)+'</span>'+chip+'</div>'+
      '<div class="meta">Encomenda '+esc(g.n_encomenda)+' · '+fmtData(g.data_encomenda)+'<br>'+trk+'</div>'+
      (g.notas?'<div class="notas">'+esc(g.notas)+'</div>':'')+
      '<div class="toggles">'+tg(g,'recebido','📦 Recebido')+tg(g,'vendido','💰 Vendido')+tg(g,'pago','✅ Pago')+'</div>'+
      '<div class="notawrap"><input class="ninput" id="nota-'+g.id+'" placeholder="Nota (opcional)…" value="'+esc(g.nota_utilizador||'')+'"><button class="nsave" onclick="saveNota('+g.id+')" title="Guardar nota">💾</button></div>'+
    '</div>';
  }).join('');
}
function tg(g,campo,rotulo){
  let cls='t';
  if(g[campo])cls+=' on';
  else if(campo==='recebido'&&g.entregue)cls+=' alerta';
  return '<button class="'+cls+'" onclick="toggle('+g.id+',\''+campo+'\')">'+rotulo+'</button>';
}
async function toggle(id,campo){
  const g=dados.find(x=>x.id===id);
  const novo=!g[campo];
  if(!novo&&!confirm('Desmarcar "'+campo+'" do '+g.nome+'?'))return;
  const body={[campo]:novo};
  if(campo==='pago'&&novo&&!g.vendido){body.vendido=true;}
  const antes={[campo]:g[campo],vendido:g.vendido};
  Object.assign(g,body);render();
  try{
    const r=await fetch(BASE+'/grelhadores?id=eq.'+id,{method:'PATCH',headers:H,body:JSON.stringify(body)});
    if(!r.ok) throw new Error(r.status);
    loadLogs();
  }catch(e){Object.assign(g,antes);render();alert('Não foi possível guardar. Verifica a internet e tenta de novo.');}
}
async function saveNota(id){
  const g=dados.find(x=>x.id===id);
  const v=document.getElementById('nota-'+id).value.trim();
  try{
    const r=await fetch(BASE+'/grelhadores?id=eq.'+id,{method:'PATCH',headers:H,body:JSON.stringify({nota_utilizador:v||null})});
    if(!r.ok) throw new Error(r.status);
    g.nota_utilizador=v||null;
    const b=document.querySelector('#nota-'+id+' + .nsave');
    if(b){b.textContent='✓';setTimeout(()=>b.textContent='💾',1500);}
    loadLogs();
  }catch(e){alert('Não foi possível guardar a nota.');}
}
loadAll();
</script>
</body>
</html>
